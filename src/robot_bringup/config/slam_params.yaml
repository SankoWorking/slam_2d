slam_toolbox:
  ros__parameters:

    # 1. 核心坐标系与话题
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping 

    # 2. 传感器参数 (RPLidar C1 优化)
    min_laser_range: 0.15
    max_laser_range: 12.0
    minimum_time_interval: 0.1
    transform_timeout: 0.2
    tf_buffer_duration: 30.0

    # 3. 扫描匹配控制 (针对无协方差里程计调优)
    # 调低移动触发阈值，增加匹配频率以补偿里程计漂移
    minimum_travel_distance: 0.05    # 移动 5cm 即更新
    minimum_travel_heading: 0.05     # 旋转约 3度即更新
    
    # 增大搜索范围，防止因里程计跳变导致匹配失败
    lookup_constraint_type: laser_scan
    minimum_similarity_score: 0.25   # 最低匹配分值
    angle_variance_penalty: 1.0      # 角度惩罚系数
    
    # 4. 闭环检测 (Loop Closure)
    # 增强全局一致性，弥补底层位姿不准
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.5 # 放宽方差限制
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    
    # 空间限制，防止地图无限增长
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 10.0

    # 5. 地图与性能
    resolution: 0.05
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # 6. 优化器 (Ceres)
    # 使用 Ceres 求解器进行图优化，这是目前最稳的选择
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_loss_function: None # 或者使用 HuberLoss 如果环境中有较多动态障碍物