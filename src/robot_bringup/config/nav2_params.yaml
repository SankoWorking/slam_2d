amcl:
  ros__parameters:
    use_sim_time: False
    # 用于中和里程计的误差
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # 定义机器人本体坐标系
    base_frame_id: "base_link"

    # 是否开启射线跳过功能，开启后将开始识别并忽略打在动态障碍物上打激光束，提高机器人在复杂场景的定位精度
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false

    # 定义全局坐标系
    global_frame_id: "map"

    # 配置计算激光测距概率的数学模型
    laser_model_type: "likelihood_field"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: -1.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    
    # 限制每次扫描中实际参与概率计算的激光束打最大数量
    max_beams: 60
    
    # 粒子滤波器允许存在的最大粒子数
    max_particles: 2000

    # 粒子滤波器允许存在的最小粒子数
    min_particles: 500

    # 定义里程计坐标系
    odom_frame_id: "odom"

    # 控制机器人“绑架恢复机制的灵敏度
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # 决定系统在运行时需要维持多少猜测的粒子
    pf_err: 0.05
    pf_z: 0.99

    # 定义机器人的运动学模型
    robot_model_type: "nav2_amcl::OmniMotionModel"

    # 决定粒子滤波器执行重采样的频率
    resample_interval: 1
    save_pose_rate: 0.5
    update_min_a: 0.2
    update_min_d: 0.25

    # 是否由AMCL发布TF变换及TF变换的保质期
    tf_broadcast: true
    transform_tolerance: 0.6
    
    # 定义雷达话题
    scan_topic: scan

    # 配置机器人初始位置
    set_initial_pose: true
    initial_pose:
      x: 10.1592 
      y: -1.04391
      z: 0.0
      yaw: -1.63493

