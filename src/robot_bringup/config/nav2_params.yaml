controller_server:
  ros__parameters:
    use_sim_time: False  # 修正：实机必须为 False
    controller_frequency: 20.0  # 提升频率，满足 MPPI 逻辑并让控制更平滑
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.2
    
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 45
      model_dt: 0.05  # 必须等于 1/controller_frequency (1/20=0.05)
      batch_size: 800 # Orin Nano 建议 800-1000
      iteration_count: 1
      v_std: [0.15, 0.1, 0.3]
      v_mag_std: [0.1, 0.1, 0.1]
      predict_cost: true
      reset_period: 1.0
      visualize: false # 实机运行关闭可视化以节省 CPU
      warm_start: true # 开启预热，提升连续帧性能
      motion_model: "Omni"
      vx_max: 0.3
      vx_min: -0.3
      vy_max: 0.2
      vy_min: -0.2
      wz_max: 1.2
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_weight: 4.0
        critical_cost: 250.0 # 略微提升允许的碰撞成本阈值
        consider_footprint: false # 降低计算量
        collision_cost: 1000000.0
      GoalCritic:
        enabled: true
        goal_cost_weight: 5.0
      PathAlignCritic:
        enabled: true
        cost_weight: 5.0
        trajectory_point_step: 4 # 减小步长，提高对齐精度

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      transform_tolerance: 0.6
      rolling_window: true
      width: 4 # 略微缩小窗口，减少内存开销
      height: 4
      resolution: 0.05
      robot_radius: 0.21
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.8
      obstacle_layer: 
        plugin: "nav2_costmap_2d::ObstacleLayer" 
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names: ['map_server', 'amcl', 'planner_server', 'controller_server', 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']
    bond_timeout: 10.0 # 增加到10秒，防止 Orin Nano 启动瞬间超时